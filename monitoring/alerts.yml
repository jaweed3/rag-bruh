groups:
  - name: library-rag
    rules:
      - alert: HighErrorRate
        expr: rate(rag_http_requests_total{status=~"5.."}[5m]) / rate(rag_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Error rate > 5% over 5m"

      - alert: HighQueryLatency
        expr: histogram_quantile(0.95, rate(rag_generation_latency_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P95 generation latency > 30s"

      - alert: AppDown
        expr: up{job="library-rag"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "App is down"

      - alert: NoQueries
        expr: rate(rag_queries_total[5m]) == 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "No queries in 10m"
